<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Session ID</title>
    <style>
      body { font-family: system-ui, sans-serif; min-width: 280px; padding: 12px; }
      label { display: block; font-size: 12px; margin-bottom: 4px; }
      input { width: 100%; box-sizing: border-box; padding: 6px; margin-bottom: 10px; }
      button { width: 100%; padding: 8px; cursor: pointer; }
      .status { font-size: 12px; color: #0a0; min-height: 16px; }
    </style>
  </head>
  <body>
    <label for="sessionId">Session ID</label>
    <input id="sessionId" type="text" placeholder="session1234" />
    <button id="save">Save</button>
    <p class="status" id="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
