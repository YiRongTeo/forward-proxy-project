<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Proxy Credentials</title>
    <style>
      body { font-family: system-ui, sans-serif; min-width: 320px; padding: 12px; }
      label { display: block; font-size: 12px; margin-bottom: 4px; }
      input { width: 100%; box-sizing: border-box; padding: 6px; margin-bottom: 10px; }
      button { width: 100%; padding: 8px; cursor: pointer; margin-bottom: 8px; }
      .status { font-size: 12px; color: #0a0; min-height: 16px; margin-bottom: 8px; }
      .hint {
        font-size: 11px;
        color: #555;
        line-height: 1.4;
        background: #f5f5f5;
        padding: 8px;
        border-radius: 4px;
      }
      .meta { font-size: 11px; color: #333; margin-top: 8px; }
    </style>
  </head>
  <body>
    <label for="userSessionId">User session ID (proxy username)</label>
    <input id="userSessionId" type="text" placeholder="alice" />
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="password" />
    <button id="save">Save &amp; Apply</button>
    <p class="status" id="status"></p>
    <p class="meta" id="meta"></p>
    <div class="hint">
      The proxy checks that a Valkey key <code>sessions:{user}:{domain}</code> exists.
      The key value is ignored. Save your user session ID and a fixed password here;
      Chrome caches proxy credentials after the first 407 challenge.
    </div>
    <script src="rules.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
