<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Proxy Options</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 480px; padding: 16px; }
      label { display: block; margin-top: 12px; }
      input, select { width: 100%; box-sizing: border-box; padding: 6px; }
      button { margin-top: 16px; padding: 8px 16px; margin-right: 8px; }
      .status { margin-top: 12px; color: #0a0; font-size: 13px; line-height: 1.4; }
      .hint { font-size: 12px; color: #555; margin-top: 12px; }
    </style>
  </head>
  <body>
    <h1>Forward Proxy Settings</h1>
    <p>Configure which proxy server the extension routes Chrome through.</p>
    <label for="proxyScheme">Proxy scheme</label>
    <select id="proxyScheme">
      <option value="http">http</option>
      <option value="https">https (when proxy TLS is enabled)</option>
    </select>
    <label for="proxyHost">Proxy host (hostname only, no <code>http://</code>)</label>
    <input id="proxyHost" type="text" placeholder="proxy.example.com" />
    <label for="proxyPort">Proxy port (Go=8081, Node=8080 — not admin 9001/3001)</label>
    <input id="proxyPort" type="number" />
    <button id="save">Save</button>
    <button id="test" type="button">Test proxy port</button>
    <p class="status" id="status"></p>
    <p class="hint">
      Use the server IP/hostname when Chrome runs on a different machine than the proxy.
      Extension scheme must match proxy listener TLS (http unless <code>tls.certFile</code> is set).
    </p>
    <script src="rules.js"></script>
    <script src="options.js"></script>
  </body>
</html>
